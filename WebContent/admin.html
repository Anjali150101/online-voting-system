<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - NextGenVote</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">NextGen<span>Vote</span> - Admin</a>
        <div class="nav-links">
            <a href="results.html">View Results</a>
            <a href="LogoutServlet">Logout</a>
        </div>
    </nav>

    <div class="container" style="flex-direction: column; align-items: stretch; max-width: 800px; margin: 0 auto;">
        <h2 style="margin-bottom: 2rem; color: #fff;">Admin Dashboard</h2>

        <div id="msgBox"></div>

        <div class="card" style="max-width: 100%; margin-bottom: 2rem;">
            <h3>Add New Candidate</h3>
            <form action="CandidateServlet" method="POST" style="margin-top: 1rem;">
                <div class="form-group">
                    <label for="name">Candidate Name</label>
                    <input type="text" id="name" name="name" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="party">Party Name</label>
                    <input type="text" id="party" name="party" class="form-control" required>
                </div>
                <div class="form-group">
                    <label for="symbol">Symbol (Emoji or Text)</label>
                    <input type="text" id="symbol" name="symbol" class="form-control" placeholder="e.g. 🦅" required>
                </div>
                <button type="submit" class="btn mt-3">Add Candidate</button>
            </form>
        </div>
        
        <div class="card" style="max-width: 100%;">
            <h3>Quick Actions</h3>
            <div class="btn-group mt-3" style="display: flex; gap: 1rem;">
                <a href="results.html" style="text-decoration:none; flex: 1;"><button class="btn btn-outline" style="width: 100%;">Live Results</button></a>
            </div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const success = urlParams.get('success');
        const msgBox = document.getElementById('msgBox');

        if (error) {
            msgBox.innerHTML = '<div class="alert alert-error">' + error + '</div>';
        } else if (success) {
            msgBox.innerHTML = '<div class="alert alert-success">' + success + '</div>';
        }
    </script>
</body>
</html>
