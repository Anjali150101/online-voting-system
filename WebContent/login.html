<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NextGenVote</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">NextGen<span>Vote</span></a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
        </div>
    </nav>

    <div class="container">
        <div class="card">
            <h2>Voter Login</h2>
            
            <div id="msgBox"></div>

            <form action="LoginServlet" method="POST">
                <div class="form-group">
                    <label for="voterId">Voter ID</label>
                    <input type="text" id="voterId" name="voterId" class="form-control" placeholder="Enter your valid Voter ID" required>
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" class="form-control" placeholder="Enter password" required>
                </div>
                <button type="submit" class="btn mt-3">Login Securely</button>
            </form>
            <p class="text-center mt-4">
                Don't have an account? <a href="register.html" class="link">Register here</a>
            </p>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const error = urlParams.get('error');
        const success = urlParams.get('success');
        const msgBox = document.getElementById('msgBox');

        if (error) {
            msgBox.innerHTML = '<div class="alert alert-error">' + error + '</div>';
        } else if (success) {
            msgBox.innerHTML = '<div class="alert alert-success">' + success + '</div>';
        }
    </script>
</body>
</html>
