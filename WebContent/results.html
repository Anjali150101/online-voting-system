<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Results - NextGenVote</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">NextGen<span>Vote</span> - Results</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
        </div>
    </nav>

    <div class="dashboard-container" style="max-width: 800px;">
        <h2 style="text-align: center; margin-bottom: 2rem;">Real-Time Polling Results</h2>

        <div class="card" style="max-width: 100%;">
            <canvas id="resultsChart"></canvas>
            <div id="noData" style="display: none; text-align: center; padding: 2rem;">
                <p>No candidates available yet.</p>
            </div>
        </div>
    </div>

    <script>
        fetch('CandidateServlet')
            .then(response => response.json())
            .then(data => {
                if (data.length === 0) {
                    document.getElementById('noData').style.display = 'block';
                    document.getElementById('resultsChart').style.display = 'none';
                    return;
                }

                data.sort((a, b) => b.votes - a.votes); // Sort by highest votes

                const labels = data.map(c => c.name + ' (' + c.party + ')');
                const votes = data.map(c => c.votes);
                
                // Color palette array
                const colors = [
                    'rgba(79, 70, 229, 0.8)',
                    'rgba(16, 185, 129, 0.8)',
                    'rgba(245, 158, 11, 0.8)',
                    'rgba(239, 68, 68, 0.8)',
                    'rgba(139, 92, 246, 0.8)'
                ];

                const ctx = document.getElementById('resultsChart').getContext('2d');
                new Chart(ctx, {
                    type: 'bar', // Using bar chart for voters
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Total Votes',
                            data: votes,
                            backgroundColor: colors,
                            borderColor: colors.map(c => c.replace('0.8', '1')),
                            borderWidth: 1,
                            borderRadius: 4
                        }]
                    },
                    options: {
                        responsive: true,
                        scales: {
                            y: {
                                beginAtZero: true,
                                ticks: {
                                    stepSize: 1,
                                    color: '#94A3B8'
                                },
                                grid: {
                                    color: 'rgba(255, 255, 255, 0.1)'
                                }
                            },
                            x: {
                                ticks: { color: '#94A3B8' },
                                grid: { display: false }
                            }
                        },
                        plugins: {
                            legend: {
                                display: false
                            }
                        }
                    }
                });
            })
            .catch(err => console.error("Error fetching results", err));
    </script>
</body>
</html>
